id: "YAML-PRIVILEGED-CONTAINER"
severity: "HIGH"
framework: "YAML"
language: "YAML"
description: "Detects YAML manifests that enable privileged containers."
query: |
  (block_mapping_pair
    key: (flow_node
      (plain_scalar
        (string_scalar) @key (#eq? @key "privileged")
      )
    )
    value: (flow_node
      (plain_scalar
        (boolean_scalar) @value (#eq? @value "true")
      )
    )
  ) @finding
