# rules/suspicious_merge.yaml
id: "PROTOTYPE-POLLUTION-CUSTOM-MERGE"
severity: "HIGH"
description: "Flags dynamic object assignments inside 'for...in' loops. This is the classic signature of a vulnerable custom merge() or clone() function that lacks __proto__ sanitization."
query: |
  (for_in_statement
    left: (_) @loop_variable
    right: (_) @source_object
    body: (statement_block
      (_)*
      (expression_statement
        (assignment_expression
          left: (subscript_expression) @target_assignment
        )
      )
    )
  )