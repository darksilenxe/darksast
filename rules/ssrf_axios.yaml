id: "SSRF-AXIOS"
severity: "HIGH"
framework: "JavaScript"
confidence: "HIGH"
description: "Detects axios network requests that should be reviewed for SSRF when the request target is user-controlled."
taint:
  sink_capture: "url"
  require_tainted: true
query: |
  (call_expression
    function: (member_expression
      object: (identifier) @obj (#eq? @obj "axios")
      property: (property_identifier) @method (#match? @method "^(get|post|put|patch|delete|request)$")
    )
    arguments: (arguments
      (_) @url @finding
      (_)*
    )
  )
