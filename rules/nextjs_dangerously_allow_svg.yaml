id: "NEXTJS-DANGEROUSLY-ALLOW-SVG"
severity: "MEDIUM"
framework: "Next.js"
requires_dependency:
  - "next"
description: "Detects Next.js image config dangerouslyAllowSVG: true, which can increase XSS and content-security risk if untrusted SVG is served."
query: |
  (pair
    key: (property_identifier) @key
    (#eq? @key "dangerouslyAllowSVG")
    value: (true) @enabled
  )
