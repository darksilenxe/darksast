id: "DOM-XSS-INNERHTML-ASSIGN"
severity: "HIGH"
framework: "JavaScript"
confidence: "MEDIUM"
description: "Detects assignments to innerHTML, which can enable DOM XSS if the assigned value is user-controlled."
ignore_if_literal:
  - "value"
taint:
  sink_capture: "value"
  require_tainted: false
query: |
  (assignment_expression
    left: (member_expression
      property: (property_identifier) @prop (#eq? @prop "innerHTML")
    ) @innerhtml_sink
    right: (_) @value
  )
