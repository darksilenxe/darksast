id: "WEAK-SECRET-FALLBACK"
severity: "HIGH"
framework: "Node.js"
description: "Detects env-based secret configuration that falls back to a hardcoded default value."
query: |
  (variable_declarator
    name: (identifier) @name (#match? @name "(?i)(secret|password|token|key)")
    value: (binary_expression
      left: (member_expression
        object: (member_expression
          object: (identifier) @proc (#eq? @proc "process")
          property: (property_identifier) @env (#eq? @env "env")
        )
      )
      right: (string) @fallback
    )
  ) @weak_secret
