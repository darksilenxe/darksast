id: "SSRF-FETCH"
severity: "HIGH"
framework: "JavaScript"
confidence: "HIGH"
description: "Detects fetch() calls that may become SSRF sinks when URLs are attacker-controlled."
taint:
  sink_capture: "url"
  require_tainted: true
query: |
  (call_expression
    function: (identifier) @fn
    (#eq? @fn "fetch")
    arguments: (arguments
      (_) @url @finding
      (_)*
    )
  )
