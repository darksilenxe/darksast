id: "NODE-CHILD-PROCESS-EXEC"
severity: "CRITICAL"
description: "Detects child_process command execution APIs that can lead to command injection when input is untrusted."
query: |
  (call_expression
    function: (member_expression
      object: (identifier) @obj (#eq? @obj "child_process")
      property: (property_identifier) @method (#match? @method "^(exec|execSync|spawn|spawnSync)$")
    ) @command_exec
  )
