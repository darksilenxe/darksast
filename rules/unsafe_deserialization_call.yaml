id: "UNSAFE-DESERIALIZATION-CALL"
severity: "HIGH"
framework: "Node.js"
description: "Detects library deserialization calls (deserialize/unserialize) that can be dangerous with attacker-controlled input."
query: |
  (call_expression
    function: (member_expression
      object: (identifier) @obj (#match? @obj "^(serialize|phpserialize|v8|bson|ejson)$")
      property: (property_identifier) @method (#match? @method "^(deserialize|unserialize)$")
    )
  ) @deser_sink
