id: "PYTHON-PICKLE-LOADS"
severity: "HIGH"
framework: "Python"
language: "Python"
description: "Detects Python pickle load/loads deserialization usage."
query: |
  (call
    function: (attribute
      object: (identifier) @module (#eq? @module "pickle")
      attribute: (identifier) @fn (#match? @fn "^(load|loads)$")
    )
  ) @finding
