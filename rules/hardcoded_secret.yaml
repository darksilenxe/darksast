id: "HARDCODED-SECRET"
severity: "HIGH"
framework: "JavaScript"
description: "Detects hardcoded secrets, passwords, API keys, and tokens assigned directly in code."
query: |
  (variable_declarator
    name: (identifier) @name (#match? @name "(?i)(secret|password|token|api[_-]?key|access[_-]?key|private[_-]?key)")
    value: (string) @secret
  ) @hardcoded_secret
