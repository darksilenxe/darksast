id: "HARDCODED-SECRET"
severity: "HIGH"
confidence: "MEDIUM"
framework: "JavaScript"
description: "Detects hardcoded secrets, passwords, API keys, and tokens assigned directly in code."
ignore_if_matches:
  # Empty strings, obvious placeholders, and `process.env`-style references
  # are not real secrets.
  secret: "^[\"'](|.{0,3}|x+|XXX+|TODO|TBD|CHANGE_?ME|placeholder|example|test|dummy|dev|local|none|null|undefined|password|secret|\\$\\{[^}]+\\}|process\\.env\\..*)[\"']$"
query: |
  (variable_declarator
    name: (identifier) @name (#match? @name "(?i)(secret|password|token|api[_-]?key|access[_-]?key|private[_-]?key)")
    value: (string) @secret
  ) @hardcoded_secret
