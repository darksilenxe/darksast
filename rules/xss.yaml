# rules/xss.yaml
id: "XSS-01"
severity: "HIGH"
framework: "React"
confidence: "HIGH"
taint:
  sink_capture: "html_value"
  require_tainted: true
requires_dependency:
  - "react"
description: "Identifies potentially unsafe use of dangerouslySetInnerHTML."
metadata:
  category: "Cross-Site Scripting"
  taxonomy:
    - "code-pattern/framework"
  cwe:
    - "CWE-79"
  owasp:
    - "A03:2021"
  references:
    - "https://react.dev/reference/dom-elements/common#dangerously-setting-the-inner-html"
    - "https://owasp.org/www-community/attacks/xss/"
  remediation: "Avoid dangerouslySetInnerHTML for untrusted content or sanitize HTML with a vetted library such as DOMPurify before rendering."
  confidence_rationale: "dangerouslySetInnerHTML is a high-signal React sink that bypasses React's default escaping guarantees."
query: |
  (jsx_attribute
    (property_identifier) @attr_name
    (#eq? @attr_name "dangerouslySetInnerHTML")
    (jsx_expression
      (object
        (pair
          key: (property_identifier) @html_key (#eq? @html_key "__html")
          value: (_) @html_value @finding
        )
      )
    )
  )
