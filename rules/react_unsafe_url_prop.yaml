id: "REACT-UNSAFE-URL-PROP"
severity: "MEDIUM"
framework: "React"
description: "Detects dangerous javascript: or HTML data URL usage in URL-bearing JSX props."
query: |
  (jsx_attribute
    (property_identifier)
    (string) @url
    (#match? @url "(?i)^[\"']\\s*(javascript:|data:text/html)")
  ) @url_prop

  (jsx_attribute
    (property_identifier)
    (jsx_expression (string) @url)
    (#match? @url "(?i)^[\"']\\s*(javascript:|data:text/html)")
  ) @url_prop

  (jsx_attribute
    (property_identifier)
    (jsx_expression (template_string) @url)
    (#match? @url "(?i)(javascript:|data:text/html)")
  ) @url_prop
