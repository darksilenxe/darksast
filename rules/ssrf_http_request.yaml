id: "SSRF-HTTP-REQUEST"
severity: "HIGH"
framework: "Node.js"
description: "Detects http/https request helpers that can become SSRF sinks when URLs come from untrusted input."
query: |
  (call_expression
    function: (member_expression
      object: (identifier) @obj (#match? @obj "^(http|https)$")
      property: (property_identifier) @method (#match? @method "^(request|get)$")
    ) @ssrf_sink
  ) @finding
