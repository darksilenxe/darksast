id: "DOM-XSS-DOCUMENT-WRITE"
severity: "HIGH"
framework: "JavaScript"
confidence: "HIGH"
description: "Detects document.write(), a common DOM XSS sink when input content is not strictly sanitized."
taint:
  sink_capture: "value"
  require_tainted: true
query: |
  (call_expression
    function: (member_expression
      object: (identifier) @obj (#eq? @obj "document")
      property: (property_identifier) @prop (#eq? @prop "write")
    )
    arguments: (arguments
      (_) @value @finding
      (_)*
    )
  )
