id: "CORS-WILDCARD-CREDENTIALS"
severity: "HIGH"
framework: "Node.js"
description: "Detects CORS configs that combine wildcard origins with credentials enabled."
query: |
  (call_expression
    function: (identifier) @fn (#eq? @fn "cors")
    arguments: (arguments
      (object
        (pair
          key: (property_identifier) @origin_key (#eq? @origin_key "origin")
          value: (string) @origin_value (#match? @origin_value "^[\"']\\*[\"']$")
        )
        (pair
          key: (property_identifier) @cred_key (#eq? @cred_key "credentials")
          value: (true) @cred_enabled
        )
      )
    )
  ) @cors_config
